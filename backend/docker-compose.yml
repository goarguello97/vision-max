version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visionmax-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-replace-in-production}
      JWT_EXPIRES_IN: 7d
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_BASE_URL: https://api.themoviedb.org/3
      TMDB_IMAGE_URL: https://image.tmdb.org/t/p
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://vision-max.vercel.app}
      MOCK_MODE: ${MOCK_MODE:-false}
    volumes:
      - ./src:/app/src
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
